server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  h2:
    console:
      enabled: true

  cache:
    type: simple

# JWT Configuration
app:
  jwt:
    secret: testSecretKeyForJWTTokenGenerationMustBeLongEnough256BitsTest
    access-token-expiration: 3600000  # 1 hour
    refresh-token-expiration: 86400000  # 1 day

# Logging
logging:
  level:
    root: INFO
    com.taskmanager: DEBUG
    org.springframework.security: DEBUG

# CORS
cors:
  allowed-origins: http://localhost:3000

# Rate limiting disabled for tests
rate-limit:
  enabled: false

